defaults:
  - env/wan_tower@env.train
  - env/wan_tower@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "wan_bottle_pi05_grpo"
    logger_backends: ["wandb"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 10

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 1
  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 512
    group_size: ${algorithm.group_size}
    max_episode_steps: 3072
    max_steps_per_rollout_epoch: 3072
    
    reward_coef: ${algorithm.reward_coef}
    wan_wm_hf_ckpt_path: "models/wan-bottle"
    enable_offload: True
    num_inference_steps: 5
    use_rel_reward: False
    success_reward_threshold: 0.9
    reward_model:
      resize:
        enabled: True
        size: [544, 320]
        mode: bilinear
        align_corners: False
    video_cfg:
      save_video: False
      fps: 10
  eval:
    total_num_envs: 4
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 250
    max_steps_per_rollout_epoch: 240
    group_size: 1
    reward_coef: ${algorithm.reward_coef}
    wan_wm_hf_ckpt_path: ${env.train.wan_wm_hf_ckpt_path}
    enable_offload: True
    num_inference_steps: 5
    reward_model:
      resize:
        enabled: True
        size: [544, 320]
        mode: bilinear
        align_corners: False
    is_eval: True
    video_cfg:
      save_video: True
      fps: 10
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "models/pi05_seal-water-bottle-cap_weighted_bc_pytorch"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 2048
  seed: 42
  enable_offload: True

  model:
    model_path: "models/pi05_seal-water-bottle-cap_weighted_bc_pytorch"
    model_type: "openpi"
    num_action_chunks: 48
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi05_yam_bottle"
      num_images_in_input: 3
      noise_level: 0.3
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}
      add_value_head: ${actor.model.add_value_head}

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
