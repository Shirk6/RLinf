defaults:
  - env/dreamdojo_piper@env.train
  - env/dreamdojo_piper@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

# NOTE: This config wires the DreamDojo piper world model into RLinf's embodied
# GRPO loop, with pi0.5 as the policy. For *rollout* the algorithm choice does
# not matter (PPO vs GRPO only differs in the gradient step). Reward is a zero
# stub until the piper reward model lands, so any real training is meaningless
# regardless of algorithm.
#
# Before launching rollout:
# 1. Add an openpi dataconfig "pi05_piper" under
#    rlinf/models/embodiment/openpi/dataconfig/ that matches piper's obs/action
#    spec (1 RGB image, 14-dim joint-delta action padded to 32). The SFT'd
#    pi0.5 (run2/iter30000) was trained with action_horizon=50 and internal
#    action_dim=32; norm_stats live in the model dir's assets/norm_stats.json.
# 2. If switching to PPO actor-critic later: set add_value_head=True and flip
#    algorithm.loss_type=actor_critic + algorithm.adv_type=gae.

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "dreamdojo_piper_grpo"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 5

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8

  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 5.0

  filter_rewards: False
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5

env:
  group_name: "EnvGroup"
  train:
    rollout_epoch: 4
    total_num_envs: 8
    group_size: ${algorithm.group_size}
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    reward_coef: ${algorithm.reward_coef}
    enable_offload: True       # otherwise, may OOM at 1440x640
    num_inference_steps: 5     # lower for faster rollout
  eval:
    rollout_epoch: 1
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    num_inference_steps: 5
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: True
  pipeline_stage_num: 1

  model:
    # huggingface.co/Shirk6/pi05-piper-insert-mouse-battery-run2-30000-pytorch
    model_path: "/mnt/afs-h200/yuyangcheng/data/pi05-piper-insert-mouse-battery-30000"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 8192
  seed: 1234
  enable_offload: True

  model:
    model_path: "/mnt/afs-h200/yuyangcheng/data/pi05-piper-insert-mouse-battery-30000"
    model_type: "openpi"
    # FPS-domain shift: pi0.5 was SFT'd at 30 fps with action_horizon=50 (=
    # 1.67 s of motion). The DreamDojo world model was trained at 10 fps with
    # chunk=12 (= 1.2 s). To bridge these:
    #   pi0.5 outputs 36 actions per inference (RL optimizes only these 36
    #   out of the SFT'd 50; the trailing 14 slots are unused);
    #   action_utils.prepare_actions_for_piper takes a stride of 3 to
    #   downsample [:, :36] -> [:, :12] before feeding the env.
    # Both numbers below must match action_utils.prepare_actions_for_piper.
    num_action_chunks: 36
    action_dim: 14
    add_value_head: False   # GRPO does not use a critic head
    openpi:
      config_name: "pi05_piper"   # registered in rlinf/models/embodiment/openpi/dataconfig/__init__.py
      num_images_in_input: 1      # DreamDojo env returns one main image, no wrist
      noise_level: 0.5
      action_chunk: ${..num_action_chunks}
      action_env_dim: ${..action_dim}

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False  # openpi does NOT support gradient checkpointing
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
