            print(f"GPU Health Check Results:", file=sys.stderr)
            print(f"  Best TFLOPS: {best_tflops:.1f}", file=sys.stderr)
            print(f"  Min acceptable: {min_acceptable_tflops:.1f} ({TFLOPS_TOLERANCE*100:.0f}% tolerance)", file=sys.stderr)
            print(f"  Max temp: {MAX_TEMPERATURE_C}C", file=sys.stderr)
            for d, t, temp in results:
              status = "PASS" if str(d) in good_gpus else "FAIL"
              print(f"  GPU {d}: {t:.1f} TFLOPS, {temp:.1f}C [{status}]", file=sys.stderr)
            print(f"  Healthy GPUs: {len(good_gpus)}/{num_gpus}", file=sys.stderr)

            print(",".join(good_gpus))
      {% endif %}
    {% endfor %}
default-values:
  image: nvcr.io/nvidian/gear-trinity-train:latest
  workflow_name: ray_cluster
  ray_port: 6376
  num_nodes: 1
  gpus: 0
  cpus: 1
  memory: 32
  storage: 32
  workdir: /workspace/
  workdir_path: ""  # Optional: S3 path to zip file containing working directory (e.g., "s3://bucket/path/workdir.zip"). If provided, will be downloaded and extracted.
  user_command: ""  # Optional: Ray job command to run (e.g., "python train.py"). If empty, cluster stays alive.
  runtime_env_json: {}
